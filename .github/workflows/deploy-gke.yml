name: deploy-gke

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (example: v0.1.6)"
        required: true
        type: string
      chart_ref:
        description: Ref of taikoxyz/ecosystem-k8s-configs to deploy from
        required: false
        default: main
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: mainnet
        type: string
      api_base_url:
        description: "Public Tack base URL for post-deploy checks"
        required: false
        default: "https://tack.inferenceroom.ai"
        type: string
      skip_external_checks:
        description: Skip external health checks
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      chart_ref:
        required: false
        default: main
        type: string
      namespace:
        required: false
        default: mainnet
        type: string
      api_base_url:
        required: false
        default: "https://tack.inferenceroom.ai"
        type: string
      skip_external_checks:
        required: false
        default: false
        type: boolean
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      GCP_CREDENTIALS_JSON:
        required: false
      ECOSYSTEM_K8S_CONFIGS_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gke-${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [arc-runner-set]
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ inputs.api_base_url || 'https://tack.inferenceroom.ai' }}

    steps:
      - name: Checkout Tack
        uses: actions/checkout@v6

      - name: Validate workflow dispatcher
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          case "$GITHUB_ACTOR" in
            ggonzalez94|kimo-ice) ;;
            *)
              echo "::error::Manual deploy runs are restricted to ggonzalez94 and kimo-ice. Current actor: $GITHUB_ACTOR"
              exit 1
              ;;
          esac

      - name: Resolve deploy inputs
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_CHART_REF: ${{ inputs.chart_ref }}
          INPUT_NAMESPACE: ${{ inputs.namespace }}
          INPUT_API_BASE_URL: ${{ inputs.api_base_url }}
          INPUT_SKIP_EXTERNAL_CHECKS: ${{ inputs.skip_external_checks }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_TAG:-${RELEASE_EVENT_TAG:-}}"
          if [ -z "$release_tag" ]; then
            echo "::error::Could not resolve release_tag from inputs or release event"
            exit 1
          fi

          if ! echo "$release_tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::release_tag must match vX.Y.Z (got: $release_tag)"
            exit 1
          fi

          chart_ref="${INPUT_CHART_REF:-main}"
          namespace="${INPUT_NAMESPACE:-mainnet}"
          api_base_url="${INPUT_API_BASE_URL:-https://tack.inferenceroom.ai}"
          skip_external_checks="${INPUT_SKIP_EXTERNAL_CHECKS:-false}"

          {
            echo "release_tag=$release_tag"
            echo "chart_ref=$chart_ref"
            echo "namespace=$namespace"
            echo "api_base_url=$api_base_url"
            echo "skip_external_checks=$skip_external_checks"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved deploy inputs (event=$EVENT_NAME):"
          echo "  release_tag=$release_tag"
          echo "  chart_ref=$chart_ref"
          echo "  namespace=$namespace"
          echo "  api_base_url=$api_base_url"
          echo "  skip_external_checks=$skip_external_checks"

      - name: Checkout ecosystem-k8s-configs
        uses: actions/checkout@v6
        with:
          repository: taikoxyz/ecosystem-k8s-configs
          ref: ${{ steps.resolve.outputs.chart_ref }}
          path: ecosystem-k8s-configs
          token: ${{ secrets.ECOSYSTEM_K8S_CONFIGS_TOKEN || github.token }}

      - name: Validate deploy configuration
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
          GKE_CLUSTER_LOCATION: ${{ vars.GKE_CLUSTER_LOCATION }}
          TACK_KUBO_SWARM_STATIC_IP: ${{ vars.TACK_KUBO_SWARM_STATIC_IP }}
        run: |
          set -euo pipefail
          missing=()

          for name in GCP_PROJECT_ID GKE_CLUSTER_NAME GKE_CLUSTER_LOCATION TACK_KUBO_SWARM_STATIC_IP; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Actions variables: ${missing[*]}"
            exit 1
          fi

      - name: Select Google Cloud auth mode
        id: auth_mode
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT:-}" ]; then
            echo "mode=wif" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${GCP_CREDENTIALS_JSON:-}" ]; then
            echo "mode=json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Configure either Workload Identity (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) or GCP_CREDENTIALS_JSON."
          exit 1

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud with JSON key
        if: ${{ steps.auth_mode.outputs.mode == 'json' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}

      - name: Wait for container images to be published
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"

          for image in api kubo; do
            uri="us-central1-docker.pkg.dev/mainnet-trailblazer/tack/${image}:${release_version}"
            echo "Waiting for $uri to be available in Artifact Registry..."
            for attempt in {1..40}; do
              if gcloud artifacts docker images describe "$uri" --project "$GCP_PROJECT_ID" >/dev/null 2>&1; then
                echo "Found $uri"
                break
              fi

              if [ "$attempt" = "40" ]; then
                echo "::error::Timed out waiting for $uri (docker.yml may have failed; check the docker workflow run)"
                exit 1
              fi

              echo "  attempt $attempt/40: not yet present, sleeping 30s"
              sleep 30
            done
          done

      - name: Deploy Helm release
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          NAMESPACE: ${{ steps.resolve.outputs.namespace }}
          SWARM_STATIC_IP: ${{ vars.TACK_KUBO_SWARM_STATIC_IP }}
          KUBO_ANNOUNCE_ADDRESS: ${{ vars.TACK_KUBO_ANNOUNCE_ADDRESS }}
        run: |
          set -euo pipefail

          release_version="${RELEASE_TAG#v}"
          announce_address="${KUBO_ANNOUNCE_ADDRESS:-/ip4/${SWARM_STATIC_IP}/tcp/4001}"

          helm upgrade --install tack ./ecosystem-k8s-configs/mainnet/tack \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set "api.image=us-central1-docker.pkg.dev/mainnet-trailblazer/tack/api:${release_version}" \
            --set "kubo.image=us-central1-docker.pkg.dev/mainnet-trailblazer/tack/kubo:${release_version}" \
            --set "kubo.swarmStaticIP=${SWARM_STATIC_IP}" \
            --set-string "kubo.announceAddress=${announce_address}" \
            --wait \
            --rollback-on-failure \
            --timeout 15m

      - name: Verify rollouts
        env:
          NAMESPACE: ${{ steps.resolve.outputs.namespace }}
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status statefulset/tack-api --timeout=10m
          kubectl -n "$NAMESPACE" rollout status statefulset/tack-kubo --timeout=10m

      - name: Wait for health check
        if: ${{ steps.resolve.outputs.skip_external_checks != 'true' && steps.resolve.outputs.api_base_url != '' }}
        env:
          API_BASE_URL: ${{ steps.resolve.outputs.api_base_url }}
        run: |
          set -euo pipefail
          base_url="${API_BASE_URL%/}"

          for attempt in {1..20}; do
            status_code="$(
              curl \
                --silent \
                --show-error \
                --location \
                --output /tmp/tack-health.json \
                --write-out '%{http_code}' \
                "$base_url/health" || true
            )"

            if [ "$status_code" = "200" ]; then
              cat /tmp/tack-health.json
              exit 0
            fi

            echo "health check attempt $attempt/20 returned status $status_code"
            sleep 15
          done

          echo "::error::Health check did not return 200 after deployment"
          exit 1
