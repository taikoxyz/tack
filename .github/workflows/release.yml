name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: [arc-runner-set]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Check spelling
        uses: crate-ci/typos@v1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          expected_tag="v$(node -p "require('./package.json').version")"
          if [ "$expected_tag" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match package.json version $expected_tag"
            exit 1
          fi

      - name: Validate changelog entry
        run: node scripts/extract-changelog-section.mjs "$GITHUB_REF_NAME" > /dev/null

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build deploy image
        run: docker build --tag tack:release .

  github-release:
    needs: verify
    runs-on: [arc-runner-set]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release notes
        run: node scripts/extract-changelog-section.mjs "$GITHUB_REF_NAME" > RELEASE_NOTES.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Tack $GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Tack $GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag
          fi
